version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: sw_siege_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: swsiege
      POSTGRES_PASSWORD: swsiege_pass
      POSTGRES_DB: sw_siege_tracker
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sw_siege_backend
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: swsiege
      DB_PASS: swsiege_pass
      DB_NAME: sw_siege_tracker
      JWT_SECRET: change_me_in_production
      PORT: 3000
    ports:
      - '3000:3000'

volumes:
  postgres_data:
